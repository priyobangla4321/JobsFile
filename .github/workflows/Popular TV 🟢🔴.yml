        # Check Live SonyLiv updates
        echo "🔍 Checking Live SonyLiv 🔄 updates:"
        SONY_MULTIPLE_GROUPS_SECTION=$(grep -c "#AUTO-UPDATED - SonyLiv Groups" PopularTV_updated_final.m3u || echo "0")
        echo "   SonyLiv Multiple Groups section: $SONY_MULTIPLE_GROUPS_SECTION"
        
        if [ "$SONY_MULTIPLE_GROUPS_SECTION" -eq "0" ]; then
            echo "⚠️ Warning: No SonyLiv Multiple Groups section found"
        else
            # Check section position
            SONY_SECTION_LINE=$(grep -n "#AUTO-UPDATED - SonyLiv Groups" PopularTV_updated_final.m3u | cut -d: -f1)
            echo "   📍 SonyLiv Multiple Groups section at line: $SONY_SECTION_LINE"
        fi
        
        # Check for Live Event group
        LIVE_EVENT_COUNT=$(grep -c 'group-title="Live Event"' PopularTV_updated_final.m3u || echo "0")
        echo "   📺 Live Event channels: $LIVE_EVENT_COUNT"
        
        # Verify no 🔴Live Now🔴 in Live Event group
        LIVE_NOW_COUNT=$(grep -c '🔴Live Now🔴' PopularTV_updated_final.m3u || echo "0")
        if [ "$LIVE_NOW_COUNT" -gt "0" ]; then
            echo "⚠️ Warning: Found $LIVE_NOW_COUNT instances of '🔴Live Now🔴'"
        else
            echo "✅ No '🔴Live Now🔴' found - using original channel names"
        fi
        
        # Verify no "No channels found" lines
        if grep -q "No channels found" PopularTV_updated_final.m3u; then
            echo "❌ ERROR: 'No channels found' line still exists!"
            exit 1
        else
            echo "✅ 'No channels found' line is completely removed!"
        fi
        
        # Move final file to main playlist
        mv PopularTV_updated_final.m3u PopularTV.m3u
        
        echo "✅ Combined verification completed!"
        
    - name: Commit and push changes to buzzinguaecn/Pizza
      working-directory: playlist-repo
      run: |
        echo "💾 Saving combined changes to repository..."
        
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add PopularTV.m3u
        
        if git diff --staged --quiet; then
          echo "✅ No changes detected - playlist is up to date"
        else
          # বাংলাদেশের সময় নেওয়া (BD Time format)
          BANGLADESH_TIME=$(TZ='Asia/Dhaka' date +'%Y-%m-%d %I:%M:%S%p BD Time')
          
          # Calculate channel counts
          ALL_CHANNEL_UPDATES=$(grep -c "#AUTO-UPDATED -.*✅-" PopularTV.m3u || echo "0")
          ALL_CHANNEL_SKIPS=$(grep -c "#AUTO-UPDATED -.*⛔ SKIPPED ⛔" PopularTV.m3u || echo "0")
          LIVE_EVENT_COUNT=$(grep -c 'group-title="Live Event"' PopularTV.m3u || echo "0")
          SONY_LIVE_EVENT_COUNT=$(grep -c '# --- Live Event Group ---' PopularTV.m3u || echo "0")
          
          # প্রথম রানের জন্য বিশেষ commit message
          # Check if this is the first run by looking at git history
          FIRST_RUN=false
          if ! git log --oneline -n 1 --grep="🆗 Popular TV" >/dev/null 2>&1; then
            FIRST_RUN=true
          fi
          
          if [ "$FIRST_RUN" = true ]; then
            # প্রথম রানের জন্য
            COMMIT_MESSAGE="🆗 Popular TV : 🆕 Start 🆕 - "
          elif [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            # Manual run
            COMMIT_MESSAGE="🆗 Popular TV : 🆕 Start Done ✅ - "
          else
            # Scheduled run
            COMMIT_MESSAGE="🆗 Popular TV : 🔄 Updated Done ✅ - "
          fi
          
          COMMIT_MESSAGE+="All Channel ($ALL_CHANNEL_UPDATES updates, $ALL_CHANNEL_SKIPS skips) + Fancode Live Event ($LIVE_EVENT_COUNT channels) + SonyLiv Live Event ($SONY_LIVE_EVENT_COUNT channels) - $BANGLADESH_TIME"
          
          git commit -m "$COMMIT_MESSAGE"
          git push
          
          echo "🎉 Successfully updated combined playlist!"
          echo "📊 Summary:"
          echo "   Commit Message: $COMMIT_MESSAGE"
          echo "   All Channel 🔄: $ALL_CHANNEL_UPDATES channels updated"
          echo "   All Channel ⛔: $ALL_CHANNEL_SKIPS channels skipped"
          echo "   Fancode Live Event: $LIVE_EVENT_COUNT channels"
          echo "   SonyLiv Live Event: $SONY_LIVE_EVENT_COUNT channels"
          echo "   Time: $BANGLADESH_TIME"
        fi
        
    - name: Cleanup
      working-directory: playlist-repo
      run: |
        echo "🧹 Cleaning up temporary files..."
        rm -f main_playlist.m3u PopularTV_backup.m3u
        rm -f source_playlist.m3u ayna_source.m3u fancode_source.m3u sonyliv_source.m3u
        rm -f PopularTV_updated.m3u PopularTV_updated_final.m3u
        echo "✅ Cleanup completed!"
        
    - name: Success Notification
      if: success()
      run: |
        echo "🎊 Combined workflow completed successfully!"
        echo "📅 Next update in 20 minutes"
        
    - name: Failure Notification
      if: failure()
      run: |
        echo "❌ Combined workflow failed!"
        echo "Please check the logs for errors."
